name: 🚀 Mairror Ultimate Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 📦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          # نستخدم أحدث إصدار مستقر متاح في 2026
          channel: 'stable'
          
      - name: 🔧 Get dependencies
        run: |
          # مسح شامل لبقايا المحاولات القديمة
          rm -rf android .dart_tool pubspec.lock
          # إعادة إنشاء مشروع أندرويد بالاسم المعتمد
          flutter create --project-name mairror_ultimate --platforms android .
          # تحديث المكتبات لأحدث توافق
          flutter pub upgrade
          
      - name: 📱 Build APK
        run: |
          flutter build apk --release --split-per-abi --no-tree-shake-icons
          
      - name: 📤 Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: mairror-app-apks
          path: build/app/outputs/flutter-apk/*.apk
