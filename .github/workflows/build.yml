name: 🛡️ Mairror Ultimate - Force Structure Build
on: [push]
jobs:
  rebuild_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }
      
      - name: 🏗️ بناء الهيكل من الصفر (The Force)
        run: |
          # مسح أي بقايا قديمة مهيسة
          rm -rf android build .dart_tool
          # إنشاء هيكل أندرويد قانوني ومنظم
          flutter create . --platforms android --project-name mairror_ultimate
          flutter pub get

      - name: 🏗️ بناء الـ APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with:
          name: mairror-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
