name: 🛡️ Mairror Ultimate - Secure Build
on: [push]
jobs:
  validate_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }
      
      - name: 🔍 الفحص الأمني والقانوني (The Filter)
        run: |
          flutter pub get
          flutter analyze || exit 1  # لو فيه غلطة مسار أو كود، الـ Build يقف هنا فوراً

      - name: 🏗️ بناء الـ APK (بعد موافقة الفلتر)
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with: { name: mairror-apk, path: build/app/outputs/flutter-apk/app-debug.apk }
