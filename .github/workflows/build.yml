name: 🚀 Mairror Ultimate Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 📦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: 🔧 Prepare Project
        run: |
          rm -rf android .dart_tool
          flutter create --project-name mairror_ultimate --platforms android .
          
          # تعديل ملفات الـ KTS الجديدة لتعطيل الـ R8
          # بنغير true لـ false في ملفات الـ Kotlin Script
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/isMinifyEnabled = true/isMinifyEnabled = false/g' android/app/build.gradle.kts
            sed -i 's/isShrinkResources = true/isShrinkResources = false/g' android/app/build.gradle.kts
          fi
          
          # احتياطياً لو الملف القديم موجود
          if [ -f android/app/build.gradle ]; then
            sed -i 's/minifyEnabled true/minifyEnabled false/g' android/app/build.gradle
            sed -i 's/shrinkResources true/shrinkResources false/g' android/app/build.gradle
          fi

          flutter pub get
      - name: 📱 Build APK
        run: |
          # البناء بدون أي ضغط نهائياً
          flutter build apk --release --split-per-abi --no-tree-shake-icons
      - name: 📤 Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: mairror-app-apks
          path: build/app/outputs/flutter-apk/*.apk
