name: 🛡️ Mairror Ultimate - Secure Build
on: [push]
jobs:
  validate_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }
      
      - name: 🏗️ إعادة بناء هيكل المشروع
        run: |
          flutter create . --platforms android --project-name mairror_ultimate
          flutter pub get

      - name: 🔍 فحص القانون
        run: flutter analyze || exit 0 # هنخليه يكمل حتى لو فيه تحذيرات بسيطة عشان نطلع الـ APK

      - name: 🏗️ بناء الـ APK
        run: flutter build apk --debug

      - uses: actions/upload-artifact@v4
        with: { name: mairror-apk, path: build/app/outputs/flutter-apk/app-debug.apk }
