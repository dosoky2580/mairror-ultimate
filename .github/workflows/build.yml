name: 🚀 Mairror Ultimate Build
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 📦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: 🔧 Prepare Project
        run: |
          rm -rf android .dart_tool
          flutter create --project-name mairror_ultimate --platforms android .
          
          # إجبار ملف Gradle على تعطيل الضغط (السر هنا)
          sed -i 's/minifyEnabled true/minifyEnabled false/g' android/app/build.gradle
          sed -i 's/shrinkResources true/shrinkResources false/g' android/app/build.gradle
          
          # زرع قواعد Proguard شاملة لكل اللغات
          cat << 'POG' > android/app/proguard-rules.pro
          -keep class com.google.mlkit.** { *; }
          -dontwarn com.google.mlkit.**
          -keep class com.google.android.gms.** { *; }
          -dontwarn com.google.android.gms.**
          -keep class com.google.mlkit.vision.text.** { *; }
          -keep class com.google.mlkit.vision.common.** { *; }
          POG
          
          flutter pub get
      - name: 📱 Build APK
        run: |
          # البناء مع تعطيل الـ R8 تماماً من أمر التنفيذ
          flutter build apk --release --no-shrink --no-tree-shake-icons
      - name: 📤 Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: mairror-app-apks
          path: build/app/outputs/flutter-apk/*.apk
