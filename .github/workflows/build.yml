name: 🛡️ Mairror Ultimate - The Final Masterpiece
on: [push]
jobs:
  build_final:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable' }

      - name: 🏗️ إعادة بناء الموتور (The Engine)
        run: |
          # مسح شامل لأي كركبة قديمة
          rm -rf android build .dart_tool pubspec.lock
          
          # إنشاء الهيكل من الصفر بمنتهى النظام
          flutter create . --platforms android --project-name mairror_ultimate
          
          # تثبيت المكتبات (المقادير)
          flutter pub get

      - name: 🏗️ طبخ الـ APK (The Baking)
        run: |
          # بناء نسخة ديبرج سريعة وخفيفة للتجربة
          flutter build apk --debug

      - name: 📦 تسليم الأمانة (Upload)
        uses: actions/upload-artifact@v4
        with:
          name: mairror-ultimate-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
