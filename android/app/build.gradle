plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.mairror_ultimate"
    compileSdk 34 // رفع النسخة لأحدث متطلبات جوجل

    defaultConfig {
        applicationId "com.example.mairror_ultimate"
        minSdk 24    // الحد الأدنى لتشغيل الذكاء الاصطناعي
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        
        // دي مهمة جداً لـ FFmpeg
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
        }
    }
}

dependencies {
    // إضافة المكتبة بشكل مباشر لضمان التحميل
    implementation "com.arthenica:ffmpeg-kit-full:6.0-2"
}
