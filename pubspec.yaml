name: mairror_ultimate
description: Mirror Ultimate AI Project - Stable Build
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # مكتبات الصوت والترجمة (الأكثر استقراراً)
  speech_to_text: ^6.1.1
  flutter_tts: ^3.8.3
  http: ^1.1.0
  share_plus: ^7.1.0
  
  # الملفات والكاميرا
  file_picker: ^6.0.0
  path_provider: ^2.1.0
  url_launcher: ^6.2.0
  camera: ^0.10.5
  google_ml_kit: ^0.16.0
  
  # الأمان (متوافقة تماماً)
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.1

  # الشطرنج (الإصدار اللي اتفقنا عليه يا تامر)
  chess: ^0.9.0

flutter:
  uses-material-design: true
