name: mairror_app
description: تطبيق المرايا ألتيميت - Mairror Ultimate
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=3.0.0 <4.0.0'
dependencies:
  flutter: {sdk: flutter}
  cupertino_icons: ^1.0.6
  google_mlkit_translation: ^0.13.1
  google_mlkit_text_recognition: ^0.15.1
  google_mlkit_commons: ^0.11.1
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  camera: ^0.11.0
  syncfusion_flutter_pdf: ^25.2.7
  flame: ^1.10.1
  provider: ^6.1.1
  shared_preferences: ^2.2.2
flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
