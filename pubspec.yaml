name: mairror_ultimate
description: Mairror Ultimate - The Final Masterpiece
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # أحدث النسخ المستقرة لضمان أعلى أداء
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.13.0
  http: ^1.2.1
  flutter_secure_storage: ^9.2.2
  flame: ^1.18.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# إجبار النظام على التوافق مع أحدث حزم الويب والـ JS
dependency_overrides:
  js: ^0.7.1
  web: ^0.5.1

flutter:
  uses-material-design: true
  assets:
    - assets/
