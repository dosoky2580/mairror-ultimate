name: mairror_ultimate
description: Mirror Ultimate 2026 - The Final Masterpiece.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  camera: ^0.11.0+2
  # ML Kit لتفعيل عالم العدسة
  google_mlkit_text_recognition: ^0.14.0
  google_mlkit_commons: ^0.7.0
  # أدوات المشاركة والحذف (ركن الترجمة)
  path_provider: ^2.1.3
  share_plus: ^10.1.0
  # مكتبات الصوت (المايك والنطق)
  speech_to_text: ^6.6.2
  flutter_tts: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
