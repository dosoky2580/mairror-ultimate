name: mairror_ultimate
description: The Final Masterpiece by Tamer
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # الشطرنج المستقر
  chess: ^0.8.1
  
  # الأمان (نسخ لا تطلب Namespace الجديد)
  local_auth: 1.1.11
  encrypt: 5.0.1
  
  # الوسائط والمستندات
  flutter_tts: 3.6.3
  share_plus: 6.3.1
  syncfusion_flutter_pdfviewer: 20.4.54
  hive: 2.2.3
  hive_flutter: 1.1.0
  url_launcher: 6.1.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/stories_data.json
    - assets/images/backgrounds/
