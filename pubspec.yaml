name: mairror_ultimate
description: The Final Masterpiece by Tamer
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # المحرك الخام
  chess: ^0.8.1
  
  # الأمان (تم اختيار نسخ مستقرة جداً)
  local_auth: 2.1.6
  encrypt: 5.0.3
  
  # الوسائط والمستندات
  flutter_tts: 3.8.3
  share_plus: 7.1.0
  syncfusion_flutter_pdfviewer: 21.1.35
  hive: 2.2.3
  hive_flutter: 1.1.0
  url_launcher: 6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/stories_data.json
    - assets/images/backgrounds/
